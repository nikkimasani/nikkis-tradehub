<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0e17">
<title>TradeLab Microsoft Sign-In</title>
<style>
  :root {
    --bg:#0a0e17;
    --surface:#111827;
    --border:#1f2d45;
    --text:#e8f0fe;
    --muted:#7a8ba8;
    --accent:#60b4ff;
  }
  * { box-sizing:border-box; }
  body {
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at top, rgba(96,180,255,.18), transparent 35%), var(--bg);
    color:var(--text); font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding:24px;
  }
  .card {
    width:min(440px, 100%); background:var(--surface); border:1px solid var(--border);
    border-radius:18px; padding:28px 24px; text-align:center; box-shadow:0 24px 60px rgba(0,0,0,.38);
  }
  .icon { font-size:42px; margin-bottom:14px; }
  h1 { margin:0 0 10px; font-size:22px; }
  p { margin:0; color:var(--muted); line-height:1.6; font-size:14px; }
  #status { margin-top:16px; color:var(--accent); font-weight:700; }
  a { color:var(--accent); }
</style>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.39.0/lib/msal-browser.min.js"></script>
</head>
<body>
  <div class="card">
    <div class="icon">📁</div>
    <h1>Connecting Microsoft Library</h1>
    <p>This page is only used to start Microsoft sign-in safely on mobile and PWA installs. You will return to TradeLab automatically.</p>
    <div id="status">Preparing sign-in…</div>
  </div>
<script>
  (async function startMicrosoftAuth() {
    const status = document.getElementById('status');
    let clientId = localStorage.getItem('td_lib_client_id') || '3303bf34-4367-47a8-b925-7d9189d81d94';
    if (clientId === '0f962b69-dd93-4e33-8a69-3c5ec1576ebf' || clientId === '95da8234-cfc9-4303-884c-819479bd9b52') clientId = '3303bf34-4367-47a8-b925-7d9189d81d94';
    if (!window.msal?.PublicClientApplication) {
      status.textContent = 'Microsoft sign-in library failed to load. Go back and reload the app.';
      return;
    }
    try {
      const redirectUri = 'https://tradehub-sooty.vercel.app/';
      const app = new msal.PublicClientApplication({
        auth: {
          clientId,
          authority: 'https://login.microsoftonline.com/consumers',
          redirectUri
        },
        cache: {
          cacheLocation: 'localStorage',
          storeAuthStateInCookie: true
        }
      });
      status.textContent = 'Redirecting to Microsoft…';
      app.loginRedirect({
        scopes: ['Files.Read.All', 'User.Read'],
        redirectStartPage: redirectUri
      });
    } catch (e) {
      status.textContent = 'Could not start sign-in: ' + (e.errorMessage || e.message || String(e));
    }
  })();
</script>
</body>
</html>
